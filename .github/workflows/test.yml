name: Test GACL

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *" # 2:00 AM PST (UTC-8)

jobs:
  test:
    name: Test (${{ matrix.configuration }}-${{ matrix.platform }})
    runs-on: windows-latest
    timeout-minutes: 180
    permissions:
      checks: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x64]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          lfs: false
          
      - uses: ./.github/actions/build-core
        with:
          configuration: ${{ matrix.configuration }}
          platform: ${{ matrix.platform }}

      - name: Run native tests
        shell: pwsh
        run: |
          $binDir = "${{ github.workspace }}\out\${{ matrix.configuration }}\${{ matrix.platform }}\bin"
          $testBins = Get-ChildItem -Path $binDir `
            -Filter "*tests.exe" -Recurse
          foreach ($test in $testBins) {
            Push-Location $binDir
            & $test.FullName `
              --gtest_output=xml:"${{ github.workspace }}\TestResults\$($test.BaseName).xml"
            Pop-Location
          }

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (${{ matrix.configuration }}-${{ matrix.platform }})
          path: TestResults/*.xml
          reporter: java-junit
