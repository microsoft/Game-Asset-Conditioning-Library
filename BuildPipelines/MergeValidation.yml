name: $(date:yyMM).$(date:dd)$(rev:rr) - MergeCheck

# Trigger on commits to main
trigger:
  batch: true
  branches:
    include:
      - main

# Daily 2:00am PST == 10:00 UTC
schedules:
  - cron: "0 10 * * *"
    displayName: "Nightly GitIgnore Validation"
    branches:
      include:
        - main
    always: true

pool:
  vmImage: windows-latest

steps:
  - checkout: self
    fetchDepth: 1
    lfs: false
    clean: true
    sparseCheckoutPatterns: |
      /.gitignore
    displayName: 'Sparse checkout .gitignore only'

  - pwsh: |
      $gitignorePath = "$(Build.SourcesDirectory)\.gitignore"

      if (-not (Test-Path $gitignorePath)) {
        Write-Host "##[error] .gitignore file not found at $gitignorePath"
        exit 1
      }

      Write-Host "Reading .gitignore from $gitignorePath"

      $forbiddenPatterns = @(
        "[Ii]nternal/",
        "[Ee]s-metadata.yml"
      )

      $gitignoreContent = Get-Content $gitignorePath
      $foundIssues = @()

      foreach ($pattern in $forbiddenPatterns) {
        if ($gitignoreContent -contains $pattern) {
          $foundIssues += $pattern
          Write-Host "##[error] FORBIDDEN PATTERN found in .gitignore: $pattern"
        }
        else {
          Write-Host "OK - Pattern not found (good): $pattern"
        }
      }

      if ($foundIssues.Count -gt 0) {
        Write-Host "##vso[task.complete result=Failed] VALIDATION FAILED: Found $($foundIssues.Count) forbidden pattern(s) in .gitignore"
        exit 1
      }

      Write-Host "VALIDATION PASSED: .gitignore does not contain forbidden patterns"
    displayName: 'Validate .gitignore forbidden patterns'
    failOnStderr: false
